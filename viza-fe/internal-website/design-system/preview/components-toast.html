<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{background:#fafafa;margin:0;font-family:var(--font-sans)}
  .stage{width:700px;padding:24px;box-sizing:border-box;display:flex;flex-direction:column;gap:14px}
  .label{font:500 11px "Geist";letter-spacing:.06em;text-transform:uppercase;color:rgba(0,0,0,.45);margin-bottom:4px}
  .toast{width:100%;max-width:440px;background:#fff;border:1px solid #efefef;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);padding:16px 44px 16px 18px;display:flex;align-items:flex-start;gap:12px;position:relative}
  .icon{width:20px;height:20px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;margin-top:1px}
  .ok{background:#16a34a}
  .warn{background:#d97706}
  .err{background:hsl(0 72% 51%)}
  .info{background:#03346E}
  .t{font:600 14px var(--font-sans);color:#3d3d3d;margin:0 0 2px}
  .d{font:400 13px/1.45 var(--font-sans);color:rgba(0,0,0,.55);margin:0}
  .action{margin-left:auto;height:28px;padding:0 10px;background:transparent;border:1px solid #e8e8e8;border-radius:6px;font:500 12px var(--font-sans);color:#03346E;cursor:pointer;align-self:center;flex-shrink:0}
  .body{flex:1;min-width:0}
  .x{position:absolute;right:8px;top:8px;width:28px;height:28px;color:#c5c5c5;display:inline-flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;transition:background .15s}
  .x:hover{background:#f3f4f6;color:#3d3d3d}
  .x svg{width:16px;height:16px;display:block}
  .dest{background:hsl(0 72% 51%);color:#fff;border-color:hsl(0 72% 45%)}
  .dest .t,.dest .d{color:#fff}
  .dest .d{opacity:.85}
  .dest .x{color:rgba(255,255,255,.7)}
  .dest .icon{background:#fff;color:hsl(0 72% 51%)}
</style></head>
<body><div class="stage">
  <div>
    <div class="label">Default · success</div>
    <div class="toast"><div class="icon ok">✓</div>
      <div class="body"><p class="t">Passport uploaded</p><p class="d">We'll let you know when review is complete.</p></div>
      <span class="x"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span>
    </div>
  </div>
  <div>
    <div class="label">Default · with action</div>
    <div class="toast"><div class="icon info">i</div>
      <div class="body"><p class="t">Application saved</p><p class="d">Draft synced 2 seconds ago.</p></div>
      <button class="action">View</button>
      <span class="x"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span>
    </div>
  </div>
  <div>
    <div class="label">Destructive</div>
    <div class="toast dest"><div class="icon">!</div>
      <div class="body"><p class="t">Upload failed</p><p class="d">Your connection dropped. Please try again.</p></div>
      <span class="x"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span>
    </div>
  </div>
</div></body></html>
