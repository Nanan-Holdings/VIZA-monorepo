<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{background:#fafafa;margin:0}
  .wrap{position:relative;width:700px;height:460px;background:#fafafa;overflow:hidden}
  .scrim{position:absolute;inset:0;background:rgba(0,0,0,.35)}
  .sheet{position:absolute;top:0;right:0;bottom:0;width:360px;background:#fff;box-shadow:-8px 0 24px rgba(0,0,0,.08);padding:24px;box-sizing:border-box;font-family:var(--font-sans);display:flex;flex-direction:column;gap:16px}
  .sheet h4{font:600 18px var(--font-heading);letter-spacing:-.4px;margin:0;color:#3d3d3d}
  .sheet .sub{font:400 13px var(--font-sans);color:rgba(0,0,0,.45);margin:-12px 0 0}
  .row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #efefef;font-size:14px;color:#3d3d3d}
  .row .k{color:rgba(0,0,0,.55);font-size:13px}
  .lbl{position:absolute;left:16px;top:14px;font:500 10px "Geist",system-ui;letter-spacing:.08em;text-transform:uppercase;color:rgba(0,0,0,.45)}
  .x{position:absolute;right:16px;top:16px;width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;color:#989898;border-radius:6px;cursor:pointer;transition:background .15s,color .15s;background:transparent;border:0}
  .x:hover{background:#f3f4f6;color:#3d3d3d}
  .x svg{width:18px;height:18px;display:block;stroke-width:2}
  .behind{padding:24px;display:grid;gap:16px;grid-template-columns:1fr 1fr;opacity:.5}
  .card{background:#fff;border:1px solid #efefef;border-radius:12px;height:100px}
  .fab{margin-top:auto;display:flex;gap:8px}
  .btn{height:40px;padding:0 16px;border-radius:999px;font:500 14px var(--font-sans);border:0;cursor:pointer}
  .btn-p{background:#03346E;color:#fff;flex:1}
  .btn-g{background:transparent;color:#3d3d3d;border:1px solid #e8e8e8}
</style></head>
<body>
<div class="wrap">
  <span class="lbl">Sheet · side · right · 360px</span>
  <div class="behind"><div class="card"></div><div class="card"></div><div class="card"></div><div class="card"></div></div>
  <div class="scrim"></div>
  <div class="sheet">
    <button class="x" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <h4>Filter applications</h4>
    <p class="sub">Refine by country, visa type, or status.</p>
    <div>
      <div class="row"><span class="k">Country</span><span>All</span></div>
      <div class="row"><span class="k">Visa type</span><span>Tourist · B211A</span></div>
      <div class="row"><span class="k">Status</span><span>In progress</span></div>
      <div class="row"><span class="k">Submitted after</span><span>Jan 1, 2026</span></div>
    </div>
    <div class="fab"><button class="btn btn-g">Reset</button><button class="btn btn-p">Apply filters</button></div>
  </div>
</div>
</body></html>
