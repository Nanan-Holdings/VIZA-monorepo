<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{background:#fff}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;align-items:start}
  .group h4{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--fg-2);margin:0 0 12px;font-weight:500}
  .stack{display:flex;flex-direction:column;gap:10px;align-items:flex-start}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:48px;padding:0 24px;border-radius:999px;font:500 15px/1 "Geist", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;border:1px solid transparent;cursor:pointer;transition:background .15s}
  .primary{background:#03346E;color:#fff}
  .primary:hover{background:#022B5C}
  .secondary{background:transparent;color:#03346E;border-color:#03346E}
  .secondary:hover{background:rgba(3,52,110,.05)}
  .ghost{background:transparent;color:#3d3d3d;height:40px;padding:0 16px;border-radius:6px}
  .ghost:hover{background:#EEF3FA;color:#03346E}
  .disabled{opacity:.5;pointer-events:none}
  .spin{width:14px;height:14px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:s 1s linear infinite}
  .spin.dark{border-color:#03346E;border-top-color:transparent}
  @keyframes s{to{transform:rotate(360deg)}}
</style></head>
<body><div class="stage">
<div class="grid">
  <div class="group">
    <h4>Primary · flow CTA</h4>
    <div class="stack">
      <button class="btn primary">继续</button>
      <button class="btn primary"><span class="spin"></span> Validating…</button>
      <button class="btn primary disabled">Continue</button>
    </div>
  </div>
  <div class="group">
    <h4>Secondary · outline</h4>
    <div class="stack">
      <button class="btn secondary">Re-validate</button>
      <button class="btn secondary"><span class="spin dark"></span> Checking…</button>
      <button class="btn secondary disabled">Re-validate</button>
    </div>
  </div>
  <div class="group">
    <h4>Ghost · in-card action</h4>
    <div class="stack">
      <button class="btn ghost">+ Add document</button>
      <button class="btn ghost">Edit</button>
      <button class="btn ghost" style="color:hsl(0 84% 60%)">Delete</button>
    </div>
  </div>
</div>
</div></body></html>
