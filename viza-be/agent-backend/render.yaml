services:
  - type: web
    name: viza-agent-backend
    runtime: node
    region: singapore
    # CI-005: 'free' spins down on idle and drops the Socket.IO WebSocket —
    # use 'starter' (always-on) for this persistent WS service.
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # CI-005: match the Dockerfile EXPOSE/ENV (8080). The app listens on
      # process.env.PORT, so this is the single source for the port.
      - key: PORT
        value: "8080"
      - key: ANTHROPIC_API_KEY
        sync: false
      # Passport-scan OCR (POST /api/passport-scan/extract) runs on OpenAI
      # vision, not Anthropic — without this the route returns 500
      # "OCR service not configured". Optional model override defaults to
      # gpt-4o-mini in code.
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_PASSPORT_SCAN_MODEL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
