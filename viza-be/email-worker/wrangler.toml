# Cloudflare Email Worker — viza-email-worker (INBOX-002)
#
# Bind the route at the Cloudflare dashboard:
#   Email → Email Routing → Routes → Catch-all → Send to a worker → viza-email-worker
#
# Required env vars (set via `wrangler secret put`):
#   SUPABASE_URL                — https://<project>.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY   — service-role key (writes inbound_email)
#   RESEND_API_KEY              — forwards alias mail to applicant real email
#
# Optional:
#   INLINE_BODY_MAX_BYTES       — inline body threshold. Defaults to 1 MB.
#   INBOX_BODIES                — R2 binding for raw-message retry archives.

name = "viza-email-worker"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Vars (non-secret). Secrets configured via `wrangler secret put`.
[vars]
INLINE_BODY_MAX_BYTES = "1048576"
# 25 MB hard-reject ceiling (INBOX-007). Sender retries on the 5xx.
MAX_RAW_BYTES = "26214400"
# Cloudflare's spamScore is 0..1 in practice, but 3rd-party headers
# (X-Spam-Score) can run up to 5+. Quarantine at >=5 — tune in prod.
SPAM_SCORE_QUARANTINE = "5"
INBOX_FORWARD_FROM = "VIZA <noreply@viza.app>"

[triggers]
crons = ["*/1 * * * *"]

# Add this binding after R2 is enabled for the Cloudflare account:
# [[r2_buckets]]
# binding = "INBOX_BODIES"
# bucket_name = "viza-inbox-bodies"
# preview_bucket_name = "viza-inbox-bodies-preview"

[env.preview]
name = "viza-email-worker-preview"
