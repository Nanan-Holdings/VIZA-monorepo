# DEP-001: Cloud Run service manifest for the submission-service poller.
#
# This is a long-running poller (not request-driven), so min-instances is 1 —
# the instance must stay warm to drain runner_job + submission_queue. Health
# probes hit the DEP-004 HTTP server (/health, /ready).
#
# Deliverable is this committed YAML. NO console deploy is performed by the
# agent. Apply with:
#   gcloud run services replace viza-be/submission-service/deploy/cloudrun-service.yaml --region us-central1
#
# Env values are referenced BY NAME only — secrets live in Secret Manager and
# are wired via `valueFrom.secretKeyRef`. Replace PROJECT_ID and image digest
# before applying. See docs/infra/submission-service-deploy.md.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: viza-submission-service
  labels:
    app: viza-submission-service
  annotations:
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        # Persistent poller: keep one instance always warm.
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "1"
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containerConcurrency: 1
      timeoutSeconds: 300
      containers:
        - image: ghcr.io/REPLACE_ORG/viza-runner:REPLACE_SHA
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "8080"
            # --- Non-secret config (set inline or via env) ---
            - name: RUNNER_CONCURRENCY_JSON
              value: '{"default":1}'
            # --- Secrets (Secret Manager refs — names only, no values) ---
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: supabase-url
                  key: latest
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-service-role-key
                  key: latest
            - name: SUBMISSION_RESULT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: submission-result-secret-key
                  key: latest
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: resend-api-key
                  key: latest
            - name: TWOCAPTCHA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: twocaptcha-api-key
                  key: latest
            - name: IMAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: imap-password
                  key: latest
          resources:
            limits:
              cpu: "1"
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
          # Readiness gate: DB reachable + worker loop started.
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
