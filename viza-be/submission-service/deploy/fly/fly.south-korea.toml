# Korea's interactive e-Form and KVAC browser sessions stay on one always-on
# machine because SMS/OTP flows retain a short-lived Playwright session in memory.
app = "viza-runner-south-korea"
primary_region = "sin"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  RUNNER_JOB_COUNTRY = "south_korea"
  SUBMISSION_SERVICE_LEGACY_QUEUE_ENABLED = "false"
  SUBMISSION_SERVICE_RUNNER_JOB_CONSUMER_ENABLED = "true"
  KR_KVAC_LOCAL_OFFICIAL_SESSION_ENABLED = "true"
  KR_VISA_PORTAL_EFORM_LOCAL_ENABLED = "true"
  KR_VISA_PORTAL_EFORM_LIVE_ENABLED = "true"
  KR_VISA_PORTAL_EFORM_SECOND_PAGE_ENABLED = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1

  [[http_service.checks]]
    grace_period = "45s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/ready"

[[vm]]
  cpu_kind = "performance"
  cpus = 2
  memory_mb = 4096
