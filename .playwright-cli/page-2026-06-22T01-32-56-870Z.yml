            - generic [ref=e106]: Viet Nam e-Visa is valid for a maximum of 90 days, fo r single or multiple entries.
          - paragraph [ref=e110]:
            - text: Electronic visa for foreigners holding passports who are not falling under the provisions of
            - strong [ref=e112] [cursor=pointer]: Clauses 1, 2, 3, and 4 of Article 8
            - text: of the Law on Entry, Exit, Transit, and Residence of Foreigners in Viet Nam.
          - paragraph [ref=e116]: The e-visa application fee is paid through the e-visa portal's e-payment gateway and is non-refundable in case the visa is not granted.
          - paragraph [ref=e120]:
            - text: "E-visa fee:"
            - strong [ref=e121]: 25 USD
            - text: for a single-entry visa /
            - strong [ref=e122]: 50 USD
            - text: for a multiple-entry visa.
          - paragraph [ref=e126]:
