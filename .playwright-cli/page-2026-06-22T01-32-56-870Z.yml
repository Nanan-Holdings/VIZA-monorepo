            - img "rights and obligations of foreigners" [ref=e160]
            - paragraph [ref=e161]: RIGHTS AND OBLIGATIONS OF FOREIGNERS
          - generic [ref=e162]:
            - generic [ref=e163]:
              - paragraph [ref=e164]:
                - generic [ref=e165]:
                  - strong [ref=e167]: "1."
                  - text: Rights of foreigners entering, exiting, transiting, and residing in Viet Nam under the Law on Entry, Exit, and Residence of Foreigners in Viet Nam (
                  - strong [ref=e169]:
                    - generic [ref=e170] [cursor=pointer]: see details
                  - text: ).
              - paragraph
              - paragraph [ref=e171]
            - generic [ref=e172]:
              - paragraph [ref=e173]:
                - generic [ref=e174]:
                  - strong [ref=e175]: "2."
                  - text: "Obligations of foreigners entering, exiting, transiting, and residing in Viet Nam under the Law on Entry, Exit, and Residence of Foreigners in Viet Nam:"
              - paragraph
              - paragraph [ref=e176]: (1) To comply with Vietnamese laws and respect Vietnamese cultural traditions, customs, and practices;
              - paragraph
              - paragraph [ref=e177]: (2) To conduct activities in Viet Nam in accordance with the purpose of entry;
              - paragraph
              - paragraph [ref=e178]: (3) To carry passports or international travel documents, as well as documents related to residence in Viet Nam, when traveling, and to present them when requested by competent authorities;
              - paragraph
              - paragraph [ref=e179]: (4) Permanent residents of foreign nationality who exit Viet Nam to reside permanently in another country must return their permanent resident cards to the exit and entry control unit at the border gate;
              - paragraph
              - paragraph [ref=e180]:
                - generic [ref=e181]:
                  - text: (5) To present passports or international travel documents, as well as documents related to residence in Viet Nam, to accommodation establishments to make temporary
                  - strong [ref=e183]:
                    - generic [ref=e184] [cursor=pointer]: residence declarations
                  - text: as prescribed.
      - generic [ref=e187]:
        - heading "NOTES" [level=3] [ref=e188]
        - generic [ref=e189]:
          - paragraph [ref=e191]: e-Visa holders in Viet Nam may be eligible to apply for a new visa if invited or guaranteed by an authority, organization, or individual in Viet Nam, in accordance with the Law on Foreigners' Entry, Exit, Transit, and Residence in Viet Nam.
          - paragraph [ref=e193]:
            - text: "The Vietnam Immigration Department highly recommends that passengers access the following link:"
            - link "https://prearrival.immigration.gov.vn" [ref=e194] [cursor=pointer]:
              - /url: https://prearrival.immigration.gov.vn
            - text: to complete their pre-arrival form prior to entering Vietnam. This proactive step will assist passengers in saving time and ensuring a swift and seamless entry procedure.
          - paragraph [ref=e196]: Foreigners entering Viet Nam must comply with Vietnamese law.
          - paragraph [ref=e198]:
            - strong [ref=e199]: "Notice:"
            - text: Foreigners falling under the categories prescribed in
            - strong [ref=e201] [cursor=pointer]: Clauses 1, 2, 3, and 4 of Article 8
            - text: of the Law on foreigners' entry, exit, transit, and residence in Viet Nam are not eligible to apply for an e-Visa on this website. They must submit visa applications through the inviting or guaranteeing agencies or organizations to the competent agency of the Ministry of Foreign Affairs.
