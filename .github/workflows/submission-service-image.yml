# DEP-005: build + push the submission-service image to GHCR, SHA-tagged.
#
# Scoped to the submission-service path. PR runs build only (validate the
# Dockerfile); pushes to main publish ghcr.io/<org>/viza-submission-service
# tagged with the commit SHA (and latest). Registry auth via the built-in
# GITHUB_TOKEN — no secret is committed.
name: submission-service-image

on:
  push:
    branches: [main]
    paths:
      - "viza-be/submission-service/**"
      - ".github/workflows/submission-service-image.yml"
  pull_request:
    paths:
      - "viza-be/submission-service/**"
      - ".github/workflows/submission-service-image.yml"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: viza-be/submission-service
          file: viza-be/submission-service/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/viza-submission-service:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/viza-submission-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke packaged Playwright runtime
        if: github.event_name == 'pull_request'
        run: |
          docker run --rm --entrypoint node \
            ghcr.io/${{ github.repository_owner }}/viza-submission-service:${{ github.sha }} \
            -e "const { chromium } = require('@playwright/test'); chromium.launch({ headless: true }).then(async b => { await b.close(); console.log('playwright-ok'); }).catch(e => { console.error(e); process.exit(1); })"
