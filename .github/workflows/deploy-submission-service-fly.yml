name: deploy-submission-service-fly

env:
  # Must match the lowercase GHCR repository emitted by the image workflow.
  SUBMISSION_IMAGE_REPOSITORY: ghcr.io/nanan-holdings/viza-submission-service

on:
  workflow_dispatch:
    inputs:
      image_sha:
        description: Full immutable Git SHA already published to GHCR
        required: true
        type: string
      countries:
        description: Comma-separated country slugs, or "all"
        required: true
        default: all
        type: string
      deploy_legacy_worker:
        description: Deploy the one legacy submission_queue worker
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    environment: production-submission_service
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_ORG: ${{ secrets.FLY_ORG }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUBMISSION_RESULT_SECRET_KEY: ${{ secrets.SUBMISSION_RESULT_SECRET_KEY }}
      # Optional capabilities are forwarded only when populated. The sync
      # script deliberately never overwrites Fly secrets with blank values.
      MDAC_BROWSER_API_ENDPOINT: ${{ secrets.MDAC_BROWSER_API_ENDPOINT }}
      MDAC_BRIGHTDATA_BROWSER_API_ENDPOINT: ${{ secrets.MDAC_BRIGHTDATA_BROWSER_API_ENDPOINT }}
      TDAC_BROWSER_API_ENDPOINT: ${{ secrets.TDAC_BROWSER_API_ENDPOINT }}
      TDAC_BRIGHTDATA_BROWSER_API_ENDPOINT: ${{ secrets.TDAC_BRIGHTDATA_BROWSER_API_ENDPOINT }}
      SGAC_BROWSER_API_ENDPOINT: ${{ secrets.SGAC_BROWSER_API_ENDPOINT }}
      BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
      TWOCAPTCHA_API_KEY: ${{ secrets.TWOCAPTCHA_API_KEY }}
      IMAP_HOST: ${{ secrets.IMAP_HOST }}
      IMAP_PORT: ${{ secrets.IMAP_PORT }}
      IMAP_EMAIL: ${{ secrets.IMAP_EMAIL }}
      IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
      FV_EMAIL: ${{ secrets.FV_EMAIL }}
      FV_PASSWORD: ${{ secrets.FV_PASSWORD }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_OPS_ALERT_TO: ${{ secrets.RESEND_OPS_ALERT_TO }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      # GitHub does not expose the workflow-level `env` context while it
      # evaluates a job-level env map, so keep this immutable registry prefix
      # literal here rather than making the workflow invalid before deploy.
      IMAGE: ghcr.io/nanan-holdings/viza-submission-service:${{ inputs.image_sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Authenticate private image registries
        shell: bash
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: |
          echo "$GHCR_TOKEN" | docker login ghcr.io --username "$GITHUB_ACTOR" --password-stdin
          flyctl auth docker
      - name: Expose Fly CLI under the deployment-script command name
        shell: bash
        run: |
          # setup-flyctl provides `flyctl`; deployment scripts use the
          # documented `fly` command. Add a job-local compatibility alias.
          if ! command -v fly >/dev/null 2>&1; then
            mkdir -p "$RUNNER_TEMP/fly-bin"
            ln -s "$(command -v flyctl)" "$RUNNER_TEMP/fly-bin/fly"
            echo "$RUNNER_TEMP/fly-bin" >> "$GITHUB_PATH"
          fi
      - name: Deploy country workers
        shell: bash
        run: |
          if [[ "${{ inputs.countries }}" == "all" ]]; then
            countries=$(jq -r '.countries[]' viza-be/submission-service/deploy/fly/countries.json)
          else
            countries=$(tr ',' '\n' <<< "${{ inputs.countries }}" | xargs -n1)
          fi
          while read -r country; do
            bash viza-be/submission-service/scripts/fly/deploy-country.sh "$country" "$IMAGE"
          done <<< "$countries"
      - name: Deploy legacy worker
        # Country workers and the legacy queue consumer are independent
        # production targets. A transient country /ready timeout must not skip
        # the legacy worker that serves Philippines eTravel and other legacy
        # submission_queue flows.
        if: ${{ inputs.deploy_legacy_worker && !cancelled() }}
        run: bash viza-be/submission-service/scripts/fly/deploy-legacy.sh "$IMAGE"
