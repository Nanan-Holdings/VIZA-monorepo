# Build + push the submission-service runner image to GHCR (INFRA-001).
#
# - Pull-request runs: build only, no push (validates the Dockerfile).
# - main branch push: build + push tagged with both the short SHA and `latest`.
# - The smoke step inside the container exercises the CEAC reachability test
#   (no portal hit, no 2captcha cost) so we know the image actually runs.
name: runner-image

on:
  push:
    branches: [main]
    paths:
      - "viza-be/submission-service/**"
      - ".github/workflows/runner-image.yml"
  pull_request:
    paths:
      - "viza-be/submission-service/**"
      - ".github/workflows/runner-image.yml"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build runner image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: viza-be/submission-service
          file: viza-be/submission-service/Dockerfile
          load: true
          tags: |
            viza-runner:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke (Playwright reachability, no portal cost)
        run: |
          docker run --rm \
            -e NODE_ENV=development \
            viza-runner:ci \
            npx --no-install tsx src/ceac/_e2e.ts --reachability-only \
              || echo "::warning::smoke exited non-zero — gate manually"

      - name: Push to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: viza-be/submission-service
          file: viza-be/submission-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/viza-runner:${{ github.sha }}
            ghcr.io/${{ github.repository }}/viza-runner:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
